name: universal_drone_app
description: 通用無人機操作 App — 支援 DJI / PX4 / ArduPilot / 自組機
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 狀態管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # WebSocket（Socket.io）
  socket_io_client: ^2.0.3+1

  # 地圖
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  google_maps_flutter: ^2.5.3

  # 圖表
  fl_chart: ^0.67.0

  # 影片串流
  video_player: ^2.8.3
  chewie: ^1.7.4

  # 本地資料庫（離線模式）
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # 本地儲存
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI 工具
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2.721
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # 工具
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/map_tiles/
