name: Build Flutter APK

on:
  push:
    branches: [claude/universal-drone-app-TDirm, main]
    paths:
      - 'universal-drone-app/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: universal-drone-app
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: universal-drone-app
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (release)
        working-directory: universal-drone-app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build App Bundle (for Play Store)
        working-directory: universal-drone-app
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-drone-app-${{ github.run_number }}
          path: |
            universal-drone-app/build/app/outputs/flutter-apk/app-release.apk
            universal-drone-app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Show APK info
        working-directory: universal-drone-app
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
          echo "APK path: $APK"
